<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Jadwal Istirahat QC</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#E8EDF5;--surface:#F2F5FB;--card:#FFFFFF;
  --topbar:#3D5A80;--topbar2:#293D5A;
  --primary:#3D72B4;--plight:#D6E4F7;--pdark:#2A5190;
  --accent:#2EB872;--danger:#E05252;--border:#D0D9E8;
  --text:#1C2B3A;--muted:#5A7090;--thead:#3D5A80;
  --shadow:0 2px 16px rgba(61,90,128,.10);
  --shadow-card:0 4px 20px rgba(61,90,128,.12);
  --r:16px;--rs:10px;
}
body.th-indigo{--topbar:#4B5DA8;--topbar2:#2E3A70;--primary:#4B5DA8;--plight:#DDE2F8;--thead:#4B5DA8}
body.th-teal{--topbar:#1F7A7A;--topbar2:#135050;--primary:#1F9090;--plight:#CCEEEE;--thead:#1F7A7A}
body.th-slate{--topbar:#4A5568;--topbar2:#2D3748;--primary:#4A5568;--plight:#E2E8F0;--thead:#4A5568}
body.th-plum{--topbar:#6B3FA0;--topbar2:#42226A;--primary:#7C4DB5;--plight:#EAD8FA;--thead:#6B3FA0}
html,body{min-height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}

.topbar{background:linear-gradient(135deg,var(--topbar) 0%,var(--topbar2) 100%);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(0,0,0,.18);gap:10px;}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.28);letter-spacing:-.5px;}
.brand-txt h1{font-size:13px;font-weight:700;color:#fff;letter-spacing:.2px;line-height:1.2}
.brand-txt p{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}
.top-btns{display:flex;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rs);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.1px;}
.btn:active{transform:scale(.93)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;font-size:17px;border-radius:10px;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.22);}
.btn-icon:hover{background:rgba(255,255,255,.25)}
.btn-add{background:linear-gradient(135deg,var(--primary),var(--pdark));color:#fff;width:100%;justify-content:center;padding:13px;font-size:14px;border-radius:12px;box-shadow:0 4px 14px rgba(61,114,180,.35);}
.btn-add:active{transform:scale(.97)}

.fab{position:fixed;bottom:22px;right:18px;z-index:300;width:54px;height:54px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--primary),var(--pdark));color:#fff;font-size:26px;font-weight:300;box-shadow:0 6px 22px rgba(61,114,180,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;}
.fab:active{transform:scale(.88);box-shadow:0 2px 8px rgba(61,114,180,.3)}

.sheet-overlay{position:fixed;inset:0;background:rgba(20,35,55,.5);backdrop-filter:blur(3px);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--surface);border-radius:22px 22px 0 0;padding:14px 20px 36px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto;box-shadow:0 -6px 32px rgba(0,0,0,.15);}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;border-radius:2px;background:#C5D0DF;margin:0 auto 18px;}
.sheet-title{font-size:15px;font-weight:800;color:var(--primary);margin-bottom:18px;display:flex;align-items:center;gap:9px;}
.sheet-title::before{content:'';display:block;width:4px;height:20px;background:var(--primary);border-radius:2px}

.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
input,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(61,114,180,.14);}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:13px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.cfg-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-card);border:1px solid var(--border);padding:16px 16px 14px;margin:14px 12px 0;}
.cfg-label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cfg-label::before{content:'⚙';font-size:12px}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tbl-wrap{margin:12px 12px 0;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden;}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:340px}
thead tr{background:linear-gradient(135deg,var(--thead) 0%,var(--topbar2) 100%)}
thead th{padding:13px 10px;text-align:center;font-size:10.5px;font-weight:800;letter-spacing:1.1px;color:rgba(255,255,255,.95);text-transform:uppercase;white-space:nowrap;}
thead th:first-child{text-align:left;min-width:70px;padding-left:14px}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:#F7FAFF}
tbody tr:hover{background:#EEF4FF}
td{padding:0;vertical-align:top;border-right:1px solid var(--border)}
td:last-child{border-right:none}
.machine-cell{padding:14px 10px 14px 14px;font-weight:800;font-size:12px;letter-spacing:.3px;color:var(--primary);background:linear-gradient(180deg,var(--plight) 0%,#e8f0fb 100%);min-width:70px;vertical-align:middle;border-right:2px solid var(--border)!important;}
.hour-cell{padding:5px 4px;min-height:56px;min-width:100px;vertical-align:top;transition:background .15s;}
.hour-cell.drag-over{background:var(--plight)!important;outline:2px dashed var(--primary);outline-offset:-4px;border-radius:4px;}

/* Simplified name tag */
.name-tag{
  display:flex;align-items:center;
  border-radius:7px;margin:3px;
  cursor:grab;touch-action:none;
  overflow:hidden;
  border:1px solid var(--tc-border,rgba(61,114,180,.25));
  background:var(--tl,var(--plight));
  transition:box-shadow .15s,transform .12s;
  user-select:none;-webkit-user-select:none;
}
.name-tag:active{cursor:grabbing}
.name-tag.sortable-ghost{opacity:.3;transform:scale(.92)}
.name-tag.sortable-drag{box-shadow:0 8px 24px rgba(0,0,0,.18)!important;transform:scale(1.05) rotate(1deg)!important;z-index:9999;}
.tag-bar{width:4px;flex-shrink:0;align-self:stretch;background:var(--tc,var(--primary));}
.tag-name{flex:1;padding:5px 7px;font-size:11px;font-weight:700;color:var(--tt,var(--pdark));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;line-height:1.3;}
.tag-del{flex-shrink:0;width:22px;align-self:stretch;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.05);font-size:10px;color:rgba(0,0,0,.3);cursor:pointer;border:none;transition:background .12s,color .12s;}
.tag-del:hover,.tag-del:active{background:#fee2e2;color:#d44}

.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--topbar2);color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:9999;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;padding:14px 16px 84px;font-size:11px;color:var(--muted);font-weight:500;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">QC</div>
    <div class="brand-txt">
      <h1>JADWAL ISTIRAHAT QC</h1>
      <p>PT. Dinar Makmur Cikarang</p>
    </div>
  </div>
  <div class="top-btns">
    <button class="btn btn-icon" onclick="cycleTheme()" title="Ganti tema">🎨</button>
    <button class="btn btn-icon" onclick="exportJPG()" title="Export JPG">🖼️</button>
    <button class="btn btn-icon" onclick="resetAll()" title="Reset">↺</button>
  </div>
</div>

<div class="cfg-card">
  <div class="cfg-label">Pengaturan Tampilan</div>
  <div class="cfg-grid">
    <div class="form-group" style="margin:0">
      <label>Mode Jam</label>
      <div class="sel-wrap">
        <select id="modeJam" onchange="renderTable()">
          <option value="1-3">Jam 1 – 3</option>
          <option value="6-7">Jam 6 – 7</option>
          <option value="10-1130">Jam 10 – 11.30</option>
          <option value="all" selected>Semua Jam</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin:0">
      <label>Auto Sort A–Z</label>
      <div class="sel-wrap">
        <select id="autoSort" onchange="renderTable()">
          <option value="on">ON</option>
          <option value="off">OFF</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="tbl-wrap">
  <div class="tbl-scroll">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="footer">Dibuat oleh M. Alfin Pathul Mukarrobin © 2026</div>

<button class="fab" onclick="openSheet()">＋</button>
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Tambah Personel</div>
  <div class="form-group">
    <label>Nama Orang</label>
    <input type="text" id="inputNama" placeholder="Ketik nama..." autocomplete="off"/>
  </div>
  <div class="row2">
    <div class="form-group">
      <label>Mesin</label>
      <div class="sel-wrap"><select id="inputMesin"></select></div>
    </div>
    <div class="form-group">
      <label>Jam</label>
      <div class="sel-wrap">
        <select id="inputJam">
          <option value="1">Jam 1</option>
          <option value="3">Jam 3</option>
          <option value="6">Jam 6</option>
          <option value="7">Jam 7</option>
          <option value="10">Jam 10</option>
          <option value="1130">Jam 11.30</option>
        </select>
      </div>
    </div>
  </div>
  <button class="btn btn-add" onclick="tambahPersonel()">＋ Tambahkan</button>
</div>

<div class="toast" id="toast"></div>

<script>
const TAG_COLORS=[
  {bar:'#3D72B4',light:'#D6E4F7',text:'#1a4a80',border:'rgba(61,114,180,.3)'},
  {bar:'#2EB872',light:'#CDF4E2',text:'#0e6640',border:'rgba(46,184,114,.3)'},
  {bar:'#E07A2F',light:'#FDECD8',text:'#8a4010',border:'rgba(224,122,47,.3)'},
  {bar:'#9B59B6',light:'#EFE0FA',text:'#5a1e80',border:'rgba(155,89,182,.3)'},
  {bar:'#D44040',light:'#FBE0E0',text:'#8a1010',border:'rgba(212,64,64,.3)'},
  {bar:'#0E9E9E',light:'#CCF2F2',text:'#005858',border:'rgba(14,158,158,.3)'},
];
const nameColorMap={};
let colorIdx=0;
function getTagColor(name){
  if(!nameColorMap[name]){nameColorMap[name]=TAG_COLORS[colorIdx%TAG_COLORS.length];colorIdx++;}
  return nameColorMap[name];
}

const MACHINES_DEFAULT=['3-9','10-18','DK','DB'];
let machines=[...MACHINES_DEFAULT];
let data={};
machines.forEach(m=>{data[m]={}});

const JAM_ALL=[
  {key:'1',label:'JAM 1'},
  {key:'3',label:'JAM 3'},
  {key:'6',label:'JAM 6'},
  {key:'7',label:'JAM 7'},
  {key:'10',label:'JAM 10'},
  {key:'1130',label:'JAM 11.30'},
];
const JAM_GROUPS={
  '1-3':['1','3'],
  '6-7':['6','7'],
  '10-1130':['10','1130'],
  'all':['1','3','6','7','10','1130'],
};

const THEMES=['','th-indigo','th-teal','th-slate','th-plum'];
const TNAMES=['Steel Blue','Indigo','Teal','Slate','Plum'];
let themeIdx=0;
let sortables=[];

function getActiveJams(){
  const mode=document.getElementById('modeJam').value;
  return JAM_GROUPS[mode]||JAM_GROUPS['all'];
}
function getJamLabel(key){
  const j=JAM_ALL.find(x=>x.key===key);
  return j?j.label:('JAM '+key);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function syncMesinSelect(){
  const sel=document.getElementById('inputMesin');
  const cur=sel.value;
  sel.innerHTML=machines.map(m=>`<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
}
function openSheet(){
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('inputNama').focus(),320);
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderTable(){
  const jams=getActiveJams();
  const sort=document.getElementById('autoSort').value==='on';
  sortables.forEach(s=>s.destroy());sortables=[];

  let h='<tr><th>MESIN</th>';
  jams.forEach(j=>{h+=`<th>${getJamLabel(j)}</th>`;});
  h+='</tr>';
  document.getElementById('tableHead').innerHTML=h;

  let b='';
  machines.forEach(m=>{
    b+=`<tr><td class="machine-cell">${m}</td>`;
    jams.forEach(j=>{
      let names=(data[m][j]||[]).slice();
      if(sort) names.sort((a,c)=>a.localeCompare(c));
      data[m][j]=names;
      let tags=names.map(n=>{
        const c=getTagColor(n);
        return `<div class="name-tag"
            style="--tc:${c.bar};--tl:${c.light};--tt:${c.text};--tc-border:${c.border}"
            data-name="${encodeURIComponent(n)}">
          <div class="tag-bar"></div>
          <div class="tag-name">${n}</div>
          <button class="tag-del" onclick="hapusNama('${encodeURIComponent(m)}','${j}','${encodeURIComponent(n)}',event)">✕</button>
        </div>`;
      }).join('');
      b+=`<td class="hour-cell" data-mesin="${encodeURIComponent(m)}" data-jam="${j}">${tags}</td>`;
    });
    b+=`</tr>`;
  });
  document.getElementById('tableBody').innerHTML=b;

  document.querySelectorAll('.hour-cell').forEach(cell=>{
    const s=Sortable.create(cell,{
      group:'jadwal',animation:160,
      delay:70,delayOnTouchOnly:true,touchStartThreshold:6,
      ghostClass:'sortable-ghost',dragClass:'sortable-drag',
      onEnd(evt){
        const nama=decodeURIComponent(evt.item.dataset.name);
        const fM=decodeURIComponent(evt.from.dataset.mesin),fJ=evt.from.dataset.jam;
        const tM=decodeURIComponent(evt.to.dataset.mesin),tJ=evt.to.dataset.jam;
        if(!data[fM])data[fM]={};if(!data[fM][fJ])data[fM][fJ]=[];
        data[fM][fJ]=data[fM][fJ].filter(n=>n!==nama);
        if(!data[tM])data[tM]={};if(!data[tM][tJ])data[tM][tJ]=[];
        data[tM][tJ]=data[tM][tJ].filter(n=>n!==nama);
        const siblings=Array.from(evt.to.querySelectorAll('.name-tag'));
        const idx=siblings.indexOf(evt.item);
        if(idx>=0)data[tM][tJ].splice(idx,0,nama);else data[tM][tJ].push(nama);
        if(fM!==tM||fJ!==tJ)showToast(`↔️ ${nama} → ${tM} ${getJamLabel(tJ)}`);
        renderTable();
      }
    });
    sortables.push(s);
  });
  syncMesinSelect();
}

function tambahPersonel(){
  const nama=document.getElementById('inputNama').value.trim();
  const mesin=document.getElementById('inputMesin').value;
  const jam=document.getElementById('inputJam').value;
  if(!nama){showToast('⚠️ Isi nama terlebih dahulu!');return}
  if(!data[mesin])data[mesin]={};
  if(!data[mesin][jam])data[mesin][jam]=[];
  if(data[mesin][jam].includes(nama)){showToast(`"${nama}" sudah ada di ${mesin} ${getJamLabel(jam)}`);return}
  data[mesin][jam].push(nama);
  document.getElementById('inputNama').value='';
  renderTable();closeSheet();
  showToast(`✅ ${nama} → ${mesin} ${getJamLabel(jam)}`);
}
function hapusNama(mE,jam,nE,evt){
  evt.stopPropagation();
  const m=decodeURIComponent(mE),n=decodeURIComponent(nE);
  if(!data[m]||!data[m][jam])return;
  data[m][jam]=data[m][jam].filter(x=>x!==n);
  renderTable();showToast(`🗑️ ${n} dihapus`);
}
function resetAll(){
  if(!confirm('Reset semua data jadwal?'))return;
  machines=[...MACHINES_DEFAULT];data={};
  machines.forEach(m=>{data[m]={}});
  renderTable();showToast('🔄 Data direset');
}
function cycleTheme(){
  document.body.classList.remove(...THEMES.filter(Boolean));
  themeIdx=(themeIdx+1)%THEMES.length;
  if(THEMES[themeIdx])document.body.classList.add(THEMES[themeIdx]);
  showToast(`🎨 Tema: ${TNAMES[themeIdx]}`);
}
function exportJPG(){
  doExport();
}
function doExport(){
  showToast('⏳ Menyiapkan gambar...');
  setTimeout(()=>{
    const jams=getActiveJams();
    const cols=[{label:'MESIN',w:200},...jams.map(j=>({label:getJamLabel(j),w:260}))];
    const totalW=cols.reduce((s,c)=>s+c.w,0);
    const PAD=60;
    const TITLE_H=120;
    const HEAD_H=64;
    const ROW_H=72;
    const FOOTER_H=50;
    const canvasW=totalW+PAD*2;

    // measure max rows per machine for dynamic row height
    const rowHeights=machines.map(m=>{
      let maxNames=0;
      jams.forEach(j=>{maxNames=Math.max(maxNames,(data[m][j]||[]).length)});
      const rh=Math.max(ROW_H, maxNames*28+24);
      return rh;
    });
    const totalH=TITLE_H+HEAD_H+rowHeights.reduce((s,h)=>s+h,0)+FOOTER_H+PAD*2;

    const canvas=document.createElement('canvas');
    const DPR=2;
    canvas.width=canvasW*DPR;
    canvas.height=totalH*DPR;
    const ctx=canvas.getContext('2d');
    ctx.scale(DPR,DPR);

    // BG
    ctx.fillStyle='#FFFFFF';
    ctx.fillRect(0,0,canvasW,totalH);

    // ── TITLE ──
    ctx.textAlign='center';
    ctx.fillStyle='#C0392B';
    ctx.font='bold 46px Arial, sans-serif';
    ctx.fillText('JADWAL ISTIRAHAT',canvasW/2,PAD+62);
    // underline
    const titleW=ctx.measureText('JADWAL ISTIRAHAT').width;
    ctx.strokeStyle='#C0392B';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(canvasW/2-titleW/2,PAD+72);
    ctx.lineTo(canvasW/2+titleW/2,PAD+72);
    ctx.stroke();

    // ── TABLE ──
    const tblX=PAD;
    const tblY=TITLE_H+PAD;
    const tblW=totalW;
    const tblH=HEAD_H+rowHeights.reduce((s,h)=>s+h,0);

    // Table outer border with rounded rect
    ctx.save();
    const R=14;
    ctx.beginPath();
    ctx.moveTo(tblX+R,tblY);
    ctx.lineTo(tblX+tblW-R,tblY);
    ctx.quadraticCurveTo(tblX+tblW,tblY,tblX+tblW,tblY+R);
    ctx.lineTo(tblX+tblW,tblY+tblH-R);
    ctx.quadraticCurveTo(tblX+tblW,tblY+tblH,tblX+tblW-R,tblY+tblH);
    ctx.lineTo(tblX+R,tblY+tblH);
    ctx.quadraticCurveTo(tblX,tblY+tblH,tblX,tblY+tblH-R);
    ctx.lineTo(tblX,tblY+R);
    ctx.quadraticCurveTo(tblX,tblY,tblX+R,tblY);
    ctx.closePath();
    ctx.fillStyle='#FFFFFF';
    ctx.fill();
    ctx.strokeStyle='#E0E0E0';
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.clip();

    // Header row bg
    ctx.fillStyle='#F2F2F2';
    ctx.fillRect(tblX,tblY,tblW,HEAD_H);

    // Header text
    ctx.textAlign='center';
    ctx.fillStyle='#1C2B3A';
    ctx.font='bold 20px Arial, sans-serif';
    let cx=tblX;
    cols.forEach((col,i)=>{
      const cellCX=cx+col.w/2;
      ctx.fillText(col.label,cellCX,tblY+HEAD_H/2+7);
      cx+=col.w;
    });

    // Row separators & data
    let rowY=tblY+HEAD_H;
    machines.forEach((m,mi)=>{
      const rh=rowHeights[mi];
      // row separator
      ctx.strokeStyle='#E8E8E8';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(tblX,rowY);
      ctx.lineTo(tblX+tblW,rowY);
      ctx.stroke();

      // Machine name cell
      ctx.fillStyle='#111827';
      ctx.font='bold 22px Arial, sans-serif';
      ctx.textAlign='left';
      ctx.fillText(m,tblX+24,rowY+rh/2+8);

      // Col vertical separators & data
      let colX=tblX+cols[0].w;
      jams.forEach((j,ji)=>{
        // vertical line
        ctx.strokeStyle='#E8E8E8';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(colX,rowY);
        ctx.lineTo(colX,rowY+rh);
        ctx.stroke();

        const names=(data[m][j]||[]);
        ctx.textAlign='center';
        const cellCX=colX+cols[ji+1].w/2;

        if(names.length===0){
          ctx.fillStyle='#AAAAAA';
          ctx.font='28px Arial, sans-serif';
          ctx.fillText('–',cellCX,rowY+rh/2+10);
        } else {
          const lineH=28;
          const startY=rowY+(rh-names.length*lineH)/2+lineH-4;
          names.forEach((n,ni)=>{
            ctx.fillStyle='#1C2B3A';
            ctx.font='bold 18px Arial, sans-serif';
            ctx.fillText(n,cellCX,startY+ni*lineH);
          });
        }
        colX+=cols[ji+1].w;
      });

      // first col separator (vertical after MESIN)
      ctx.strokeStyle='#E8E8E8';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(tblX+cols[0].w,rowY);
      ctx.lineTo(tblX+cols[0].w,rowY+rh);
      ctx.stroke();

      rowY+=rh;
    });

    ctx.restore();

    // ── FOOTER ──
    ctx.textAlign='center';
    ctx.fillStyle='#AAAAAA';
    ctx.font='16px Arial, sans-serif';
    ctx.fillText('Dibuat oleh M. Alfin Pathul Mukarrobin © 2026',canvasW/2,tblY+tblH+FOOTER_H);

    const a=document.createElement('a');
    a.download='jadwal-qc.jpg';
    a.href=canvas.toDataURL('image/jpeg',.97);
    a.click();
    showToast('📥 Berhasil disimpan!');
  },100);
}

document.addEventListener('DOMContentLoaded',()=>{
  renderTable();
  document.getElementById('inputNama').addEventListener('keydown',e=>{if(e.key==='Enter')tambahPersonel()});
  let sy=0;
  const sh=document.getElementById('sheet');
  sh.addEventListener('touchstart',e=>{sy=e.touches[0].clientY},{passive:true});
  sh.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>60)closeSheet()},{passive:true});
});
</script>
